name: MissionControl
options:
  bundleIdPrefix: com.nanobot
  deploymentTarget:
    iOS: "26.0"
    macOS: "26.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false

packages:
  ConvexMobile:
    url: https://github.com/get-convex/convex-swift
    majorVersion: 0.8.1

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  MissionControl:
    type: application
    platform: [iOS, macOS]
    sources:
      - path: Sources/MissionControl
        excludes:
          - ".build"
    dependencies:
      - package: ConvexMobile
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nanobot.missioncontrol
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_KEY_CFBundleDisplayName: Mission Control
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.developer-tools"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_ENTITLEMENTS: Sources/MissionControl/MissionControl.entitlements
      configs:
        debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        release:
          SWIFT_OPTIMIZATION_LEVEL: -O
